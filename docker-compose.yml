version: '3.9'

services:

  backend:
    build: ./decs-backend
    ports:
      - "8000:8000"
    env_file:
      - ./decs-backend/.env
    depends_on:
      - mongodb

  frontend:
    build: ./decs-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  mongodb:
    image: mongo:7
    container_name: decs-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: